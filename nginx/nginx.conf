# ============================================================
# BOOTSTRAP NOTE — run once before certs exist:
#
#   1. Comment out both HTTPS server blocks below, then:
#        docker compose up -d nginx
#
#   2. Obtain separate certs for each subdomain:
#        WEBROOT=$(docker volume inspect aukse-infra_certbot_www --format '{{.Mountpoint}}')
#        certbot certonly --webroot -w $WEBROOT -d api.aukse.app \
#          --email you@example.com --agree-tos --no-eff-email
#        certbot certonly --webroot -w $WEBROOT -d dashboard.aukse.app \
#          --email you@example.com --agree-tos --no-eff-email
#
#   3. Uncomment both HTTPS blocks, then:
#        docker compose exec nginx nginx -s reload
#
# Auto-renew (add to host crontab):
#   0 3 * * * certbot renew --quiet && \
#     docker compose -f /srv/aukse/aukse-infra/docker-compose.yml \
#     exec nginx nginx -s reload
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Shared SSL session cache across all HTTPS server blocks
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    upstream api {
        server api:3000;
    }

    upstream web {
        server web:80;
    }

    # ----------------------------------------------------------------
    # api.aukse.app — HTTP (certbot challenge + redirect)
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name api.aukse.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------------
    # api.aukse.app — HTTPS
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name api.aukse.app;

        ssl_certificate     /etc/letsencrypt/live/api.aukse.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.aukse.app/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ----------------------------------------------------------------
    # dashboard.aukse.app — HTTP (certbot challenge + redirect)
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name dashboard.aukse.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------------
    # dashboard.aukse.app — HTTPS
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name dashboard.aukse.app;

        ssl_certificate     /etc/letsencrypt/live/dashboard.aukse.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dashboard.aukse.app/privkey.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
